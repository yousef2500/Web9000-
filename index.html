<!DOCTYPE html>

<html lang="en">  
<head>  
  <meta charset="UTF-8"/>  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>For Khadija ❤️</title>  
  <link rel="manifest" href="manifest.json">  
  <meta name="theme-color" content="#c9748a">  
  <meta name="apple-mobile-web-app-capable" content="yes">  
  <meta name="apple-mobile-web-app-title" content="Khadija ❤️">  
  <link rel="apple-touch-icon" href="assets/icon-192.png">  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">  
  <style>  
    :root{--deep:#0d0a14;--rose:#c9748a;--blush:#f2c5d0;--text:#f5eaf0;--glass:rgba(255,255,255,0.06)}  
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}  
    html,body{height:100%;background:var(--deep);color:var(--text);font-family:'Cormorant Garamond',serif;overflow-x:hidden}  /* STARS */  
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}  
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite}  
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}}  

/* LOCK */  
#lockScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;  
  align-items:center;justify-content:center;gap:1.4rem;  
  background:radial-gradient(ellipse at 50% 40%,#2a1040 0%,#0d0a14 70%);  
  transition:opacity .8s,visibility .8s}  
#lockScreen.gone{opacity:0;visibility:hidden;pointer-events:none}  
.lock-icon{font-size:3.5rem;animation:hb 1.6s ease-in-out infinite}  
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.12)}}  
#lockScreen h2{font-family:'Playfair Display',serif;font-style:italic;  
  font-size:clamp(1.4rem,4vw,2rem);color:var(--blush)}  
#lockScreen input{background:var(--glass);border:1px solid rgba(201,116,138,.35);  
  border-radius:50px;padding:.75rem 1.6rem;font-family:'Cormorant Garamond',serif;  
  font-size:1.1rem;color:var(--text);text-align:center;letter-spacing:.3em;  
  outline:none;width:min(260px,80vw);transition:border-color .3s,box-shadow .3s}  
#lockScreen input:focus{border-color:var(--rose);box-shadow:0 0 18px rgba(201,116,138,.3)}  
#lockScreen button{background:linear-gradient(135deg,var(--rose),#9b4a62);  
  border:none;border-radius:50px;padding:.75rem 2.2rem;  
  font-family:'Playfair Display',serif;font-size:1rem;color:#fff;  
  cursor:pointer;letter-spacing:.06em;  
  box-shadow:0 4px 20px rgba(201,116,138,.35);transition:transform .2s}  
#lockScreen button:hover{transform:scale(1.06)}  
#errorMsg{font-size:.95rem;color:#e07a8a;min-height:1.2em}  

/* APP */  
#app{position:relative;z-index:1;min-height:100vh;display:flex;  
  flex-direction:column;align-items:center;  
  padding:0 1rem 7rem;opacity:0;transition:opacity 1s}  
#app.visible{opacity:1}  

/* BANNER */  
#banner{width:100%;text-align:center;padding:1rem 1.5rem;  
  font-family:'Playfair Display',serif;font-style:italic;  
  font-size:clamp(1rem,3.5vw,1.4rem);color:var(--blush);  
  opacity:0;transition:opacity .6s;  
  background:linear-gradient(90deg,transparent,rgba(201,116,138,.08),transparent)}  

/* VIDEO */  
#videoContainer{width:min(540px,96vw);margin:.5rem auto 1.5rem}  
#videoContainer video{width:100%;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.6)}  

/* LOADING */  
#loadingOverlay{position:fixed;inset:0;z-index:150;  
  background:rgba(13,10,20,.88);backdrop-filter:blur(6px);  
  display:flex;flex-direction:column;align-items:center;justify-content:center;  
  gap:1rem;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}  
#loadingOverlay.show{opacity:1;visibility:visible}  
.spinner{width:46px;height:46px;border:3px solid rgba(201,116,138,.2);  
  border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite}  
@keyframes spin{to{transform:rotate(360deg)}}  
#loadingOverlay p{font-family:'Playfair Display',serif;font-style:italic;  
  color:var(--blush);font-size:1rem}  

/* ALBUMS */  
.albums{display:grid;grid-template-columns:repeat(2,1fr);  
  gap:1.1rem;width:min(560px,96vw);margin:.5rem auto 0}  
.album-card{position:relative;background:var(--glass);  
  border:1px solid rgba(201,116,138,.2);border-radius:20px;  
  padding:1.4rem 1rem 1.2rem;cursor:pointer;text-align:center;  
  overflow:hidden;backdrop-filter:blur(12px);  
  transition:transform .3s,border-color .3s,box-shadow .3s}  
.album-card::before{content:'';position:absolute;inset:0;  
  background:radial-gradient(circle at 50% 0%,rgba(201,116,138,.14),transparent 70%);  
  opacity:0;transition:opacity .3s}  
.album-card:hover{transform:translateY(-5px);border-color:var(--rose);box-shadow:0 12px 35px rgba(201,116,138,.22)}  
.album-card:hover::before{opacity:1}  
.album-card:active{transform:scale(.97)}  
.album-card.loaded{border-color:rgba(201,116,138,.55)}  
.album-icon{font-size:2rem;display:block;margin-bottom:.4rem;animation:float 3.5s ease-in-out infinite}  
.album-card:nth-child(2) .album-icon{animation-delay:-.8s}  
.album-card:nth-child(3) .album-icon{animation-delay:-1.6s}  
.album-card:nth-child(4) .album-icon{animation-delay:-2.4s}  
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}  
.album-label{font-family:'Playfair Display',serif;font-size:1rem;color:var(--blush)}  
.album-count{font-size:.78rem;color:rgba(242,197,208,.5);margin-top:.2rem}  
.card-thumbs{display:flex;gap:3px;justify-content:center;  
  margin-top:.55rem;height:34px;overflow:hidden;border-radius:8px}  
.card-thumb{width:34px;height:34px;object-fit:cover;border-radius:5px;flex-shrink:0}  

/* MUSIC BAR */  
.music-bar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);  
  z-index:50;display:flex;align-items:center;gap:1rem;  
  background:rgba(13,10,20,.82);border:1px solid rgba(201,116,138,.25);  
  border-radius:50px;padding:.6rem 1.6rem;  
  backdrop-filter:blur(18px);box-shadow:0 4px 30px rgba(0,0,0,.5)}  
.mbtn{background:none;border:none;font-size:1.3rem;cursor:pointer;  
  color:var(--blush);padding:.3rem .4rem;border-radius:50%;  
  transition:color .2s,transform .2s,background .2s}  
.mbtn:hover{color:#fff;background:rgba(201,116,138,.18);transform:scale(1.15)}  
.mbtn.active{color:var(--rose)}  
.song-title{font-size:.88rem;color:rgba(242,197,208,.65);  
  letter-spacing:.04em;min-width:90px;text-align:center;  
  max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}  

/* MODAL */  
#modal{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;  
  background:rgba(5,3,10,.93);opacity:0;visibility:hidden;  
  transition:opacity .35s,visibility .35s;backdrop-filter:blur(8px)}  
#modal.open{opacity:1;visibility:visible}  
.modal-header{display:flex;align-items:center;gap:.8rem;  
  padding:1.2rem 1.4rem .9rem;border-bottom:1px solid rgba(201,116,138,.15)}  
.modal-title{font-family:'Playfair Display',serif;font-style:italic;  
  font-size:1.4rem;color:var(--blush)}  
.modal-count{font-size:.85rem;color:rgba(242,197,208,.4)}  
.modal-close{background:none;border:none;cursor:pointer;margin-left:auto;  
  font-size:1.5rem;color:var(--rose);transition:transform .2s}  
.modal-close:hover{transform:rotate(90deg) scale(1.2)}  
.modal-body{flex:1;overflow-y:auto;padding:1rem}  
.modal-body::-webkit-scrollbar{width:4px}  
.modal-body::-webkit-scrollbar-thumb{background:var(--rose);border-radius:4px}  

/* PHOTO GRID */  
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem}  
.photo-item{aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;  
  border:1px solid rgba(201,116,138,.18);  
  transition:transform .25s,border-color .25s,box-shadow .25s;  
  position:relative;background:rgba(201,116,138,.06)}  
.photo-item:hover{transform:scale(1.04);border-color:var(--rose);box-shadow:0 6px 22px rgba(201,116,138,.3)}  
.photo-item img,.photo-item video{width:100%;height:100%;object-fit:cover;display:block}  
.play-icon{position:absolute;inset:0;display:flex;align-items:center;  
  justify-content:center;font-size:2.2rem;color:#fff;background:rgba(0,0,0,.3);pointer-events:none}  
.empty-state{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:rgba(242,197,208,.4)}  
.empty-state .em{font-size:3rem;margin-bottom:1rem}  
.empty-state p{font-size:.95rem;line-height:1.8}  

/* LIGHTBOX */  
#lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.93);  
  display:flex;align-items:center;justify-content:center;  
  opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}  
#lightbox.open{opacity:1;visibility:visible}  
#lbImg{max-width:92vw;max-height:88vh;border-radius:14px;  
  box-shadow:0 0 60px rgba(201,116,138,.35);display:none}  
#lbVid{max-width:92vw;max-height:88vh;border-radius:14px;display:none}  
#lbClose{position:absolute;top:1rem;right:1.2rem;font-size:1.8rem;  
  color:var(--blush);background:none;border:none;cursor:pointer;z-index:1}  
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);  
  background:rgba(201,116,138,.2);border:none;color:var(--blush);  
  font-size:2rem;padding:.4rem .85rem;border-radius:50%;cursor:pointer;  
  transition:background .2s;z-index:1}  
.lb-arrow:hover{background:rgba(201,116,138,.45)}  
#lbPrev{left:.8rem} #lbNext{right:.8rem}  
#lbCap{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);  
  font-size:.82rem;color:rgba(242,197,208,.5);  
  background:rgba(0,0,0,.4);padding:.3rem .9rem;border-radius:20px;white-space:nowrap}

  </style>  
</head>  
<body>  <div id="stars"></div>  <div id="loadingOverlay">  
  <div class="spinner"></div>  
  <p>Loading memories…</p>  
</div>  <!-- LOCK -->  <div id="lockScreen">  
  <div class="lock-icon">💗</div>  
  <h2>Enter Password ❤️</h2>  
  <input type="password" id="password" placeholder="••••" autocomplete="off"  
         onkeydown="if(event.key==='Enter')checkPassword()">  
  <button onclick="checkPassword()">Open Heart</button>  
  <p id="errorMsg"></p>  
</div>  <!-- APP -->  <div id="app">  
  <div id="banner"></div>  
  <div id="videoContainer"></div>    <div class="albums">  
    <div class="album-card" id="card-first-date"  onclick="openAlbum('first-date')">  
      <span class="album-icon">🌹</span>  
      <div class="album-label">First Date</div>  
      <div class="album-count" id="count-first-date">…</div>  
      <div class="card-thumbs" id="thumbs-first-date"></div>  
    </div>  
    <div class="album-card" id="card-second-date" onclick="openAlbum('second-date')">  
      <span class="album-icon">🌙</span>  
      <div class="album-label">Second Date</div>  
      <div class="album-count" id="count-second-date">…</div>  
      <div class="card-thumbs" id="thumbs-second-date"></div>  
    </div>  
    <div class="album-card" id="card-third-date"  onclick="openAlbum('third-date')">  
      <span class="album-icon">✨</span>  
      <div class="album-label">Third Date</div>  
      <div class="album-count" id="count-third-date">…</div>  
      <div class="card-thumbs" id="thumbs-third-date"></div>  
    </div>  
    <div class="album-card" id="card-memories"    onclick="openAlbum('memories')">  
      <span class="album-icon">💫</span>  
      <div class="album-label">Memories</div>  
      <div class="album-count" id="count-memories">…</div>  
      <div class="card-thumbs" id="thumbs-memories"></div>  
    </div>  
  </div>    <div class="music-bar">  
    <button class="mbtn" onclick="prevSong()">⏮</button>  
    <button class="mbtn" id="muteBtn" onclick="toggleMute()">🔊</button>  
    <span class="song-title" id="songTitle">♪</span>  
    <button class="mbtn" onclick="nextSong()">⏭</button>  
  </div>  
</div>  <!-- MODAL -->  <div id="modal">  
  <div class="modal-header">  
    <span class="modal-title" id="modalTitle"></span>  
    <span class="modal-count" id="modalCount"></span>  
    <button class="modal-close" onclick="closeModal()">✕</button>  
  </div>  
  <div class="modal-body">  
    <div class="photo-grid" id="photoGrid"></div>  
  </div>  
</div>  <!-- LIGHTBOX -->  <div id="lightbox">  
  <button id="lbClose" onclick="closeLightbox()">✕</button>  
  <button class="lb-arrow" id="lbPrev" onclick="lbNav(-1)">‹</button>  
  <img id="lbImg" src="" alt="">  
  <video id="lbVid" controls playsinline></video>  
  <button class="lb-arrow" id="lbNext" onclick="lbNav(1)">›</button>  
  <div id="lbCap"></div>  
</div>  <script>  
/* ══════════════════════════════════════════  
   ⚙️  CONFIG  
══════════════════════════════════════════ */  
  
const ALBUM_DIRS = {  
  'first-date':  'first-date',  
  'second-date': 'second-date',  
  'third-date':  'third-date',  
  'memories':    'memories',  
};  
  
const LABELS = {  
  'first-date' : 'First Date 🌹',  
  'second-date': 'Second Date 🌙',  
  'third-date' : 'Third Date ✨',  
  'memories'   : 'Memories 💫',  
};  
  
const IMG_EXTS = ['jpg','jpeg','png','webp','JPG','JPEG','PNG'];  
const VID_EXTS = ['mp4','MP4','mov','MOV','webm'];  
const MAX = 200;  
  
const SONGS = [  
  {src:'assets/music/song1.mp3', title:'♪ Song 1'},  
  {src:'assets/music/song2.mp3', title:'♪ Song 2'},  
  {src:'assets/music/song3.mp3', title:'♪ Song 3'},  
];  
  
const MSGS = [  
  "Khadija, you are my moon ❤️",  
  "Every moment with you is magic ✨",  
  "I love you forever 🌙",  
  "You are my happiness 💖",  
  "You are my dream come true ❤️",  
  "My heart belongs to you 💕",  
  "With you every day is beautiful 🌹",  
  "You are everything to me 💫",  
];  
  
/* ══════════════════════════════════════════  
   STATE  
══════════════════════════════════════════ */  
const albums = {'first-date':[],'second-date':[],'third-date':[],'memories':[]};  
let openKey='', lbIdx=0, curSong=0, audio=null, isMuted=false;  
  
/* ══════════════════════════════════════════  
   STARS  
══════════════════════════════════════════ */  
(()=>{  
  const c=document.getElementById('stars');  
  for(let i=0;i<130;i++){  
    const s=document.createElement('div'); s.className='star';  
    const z=Math.random()*2.5+.5;  
    s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:-${(Math.random()*5).toFixed(1)}s;opacity:${Math.random()*.6+.1}`;  
    c.appendChild(s);  
  }  
})();  
  
/* ══════════════════════════════════════════  
   LOCK  
══════════════════════════════════════════ */  
function checkPassword(){  
  const v = document.getElementById('password').value;  
  if(v === 'DODO'){  
    document.getElementById('lockScreen').classList.add('gone');  
    requestAnimationFrame(()=>document.getElementById('app').classList.add('visible'));  
    startBanner();  
    unlockAudio();   /* ← التعديل: فتح AudioContext جوا user gesture */
    initMusic();  
    loadAllAlbums();  
  } else {  
    document.getElementById('errorMsg').textContent = 'Wrong password 💔';  
    setTimeout(()=>document.getElementById('errorMsg').textContent='', 2000);  
  }  
}  
  
/* ══════════════════════════════════════════  
   BANNER  
══════════════════════════════════════════ */  
function startBanner(){  
  const el=document.getElementById('banner'); let i=0;  
  function show(){  
    el.style.opacity=0;  
    setTimeout(()=>{ el.textContent=MSGS[i]; el.style.opacity=1; i=(i+1)%MSGS.length; },600);  
  }  
  show(); setInterval(show, 4500);  
}  
  
/* ══════════════════════════════════════════  
   UNLOCK AUDIO — التعديل الجديد
   بيفتح AudioContext جوا لحظة الضغط
   عشان iOS/Android يسمحوا بالصوت
══════════════════════════════════════════ */  
function unlockAudio(){  
  const ctx = new (window.AudioContext || window.webkitAudioContext)();  
  const buf = ctx.createBuffer(1, 1, 22050);  
  const src = ctx.createBufferSource();  
  src.buffer = buf;  
  src.connect(ctx.destination);  
  src.start(0);  
  ctx.resume().then(()=>{  
    if(audio) audio.play().catch(()=>{});  
  });  
}  

/* ══════════════════════════════════════════  
   MUSIC  
══════════════════════════════════════════ */  
function initMusic(){  
  if(!SONGS.length) return;  
  audio = new Audio(SONGS[curSong].src);  
  audio.volume = .65;  
  audio.addEventListener('ended', nextSong);  
  audio.play().catch(()=>{});  
  document.getElementById('songTitle').textContent = SONGS[curSong].title;  
}  
function nextSong(){ curSong=(curSong+1)%SONGS.length; reloadSong(); }  
function prevSong(){ curSong=(curSong-1+SONGS.length)%SONGS.length; reloadSong(); }  
function reloadSong(){  
  if(!audio) return;  
  audio.src=SONGS[curSong].src; audio.play().catch(()=>{});  
  document.getElementById('songTitle').textContent=SONGS[curSong].title;  
}  
function toggleMute(){  
  isMuted=!isMuted; if(audio) audio.muted=isMuted;  
  const b=document.getElementById('muteBtn');  
  b.textContent=isMuted?'🔇':'🔊'; b.classList.toggle('active',isMuted);  
}  
  
/* ══════════════════════════════════════════  
   AUTO-SCAN  
══════════════════════════════════════════ */  
function tryImg(src){  
  return new Promise(resolve=>{  
    const img = new Image();  
    img.onload  = ()=>resolve(true);  
    img.onerror = ()=>resolve(false);  
    img.src = src;  
  });  
}  
  
function tryVid(src){  
  return new Promise(resolve=>{  
    const v = document.createElement('video');  
    v.preload = 'metadata';  
    v.onloadedmetadata = ()=>resolve(true);  
    v.onerror = ()=>resolve(false);  
    v.src = src;  
  });  
}  
  
async function scanAlbum(key){  
  const base = 'assets/images/' + ALBUM_DIRS[key] + '/';  
  const found = [];  
  
  for(let n = 1; n <= MAX; n++){  
    let hit = false;  
  
    for(const ext of IMG_EXTS){  
      const src = `${base}img${n}.${ext}`;  
      if(await tryImg(src)){  
        found.push({ type:'image', src, name:`img${n}.${ext}` });  
        hit = true; break;  
      }  
    }  
  
    if(!hit){  
      for(const ext of VID_EXTS){  
        const src = `${base}img${n}.${ext}`;  
        if(await tryVid(src)){  
          found.push({ type:'video', src, name:`img${n}.${ext}` });  
          hit = true; break;  
        }  
      }  
    }  
  
    if(!hit) break;  
  }  
  
  return found;  
}  
  
async function loadAllAlbums(){  
  document.getElementById('loadingOverlay').classList.add('show');  
  
  await Promise.all(  
    Object.keys(albums).map(async key=>{  
      albums[key] = await scanAlbum(key);  
      updateCard(key);  
    })  
  );  
  
  document.getElementById('loadingOverlay').classList.remove('show');  
}  
  
/* ══════════════════════════════════════════  
   UPDATE CARD  
══════════════════════════════════════════ */  
function updateCard(key){  
  const items = albums[key];  
  const countEl  = document.getElementById('count-'  + key);  
  const thumbsEl = document.getElementById('thumbs-' + key);  
  const card     = document.getElementById('card-'   + key);  
  
  countEl.textContent = items.length ? items.length + ' photos' : 'empty';  
  thumbsEl.innerHTML  = '';  
  
  if(items.length){  
    card.classList.add('loaded');  
    items.slice(0,3).forEach(item=>{  
      if(item.type === 'image'){  
        const img = document.createElement('img');  
        img.src = item.src; img.className = 'card-thumb';  
        thumbsEl.appendChild(img);  
      } else {  
        const vid = document.createElement('video');  
        vid.src = item.src; vid.className = 'card-thumb';  
        vid.muted = true;  
        thumbsEl.appendChild(vid);  
      }  
    });  
  }  
}  
  
/* ══════════════════════════════════════════  
   OPEN ALBUM  
══════════════════════════════════════════ */  
function openAlbum(key){  
  openKey = key;  
  const items = albums[key];  
  document.getElementById('modalTitle').textContent = LABELS[key];  
  document.getElementById('modalCount').textContent = items.length ? `(${items.length})` : '';  
  const grid = document.getElementById('photoGrid');  
  grid.innerHTML = '';  
  
  if(!items.length){  
    grid.innerHTML = `  
      <div class="empty-state">  
        <div class="em">📂</div>  
        <p>No files found.<br>  
        Put photos in<br>  
        <strong>assets/images/${ALBUM_DIRS[key]}/</strong><br>  
        named <strong>img1.jpg, img2.jpg …</strong></p>  
      </div>`;  
  } else {  
    items.forEach((item, idx)=>{  
      const div = document.createElement('div');  
      div.className = 'photo-item';  
  
      if(item.type === 'image'){  
        const img = document.createElement('img');  
        img.src = item.src; img.alt = item.name; img.loading = 'lazy';  
        div.appendChild(img);  
      } else {  
        const vid = document.createElement('video');  
        vid.src = item.src; vid.muted = true; vid.loop = true; vid.playsInline = true;  
        vid.addEventListener('mouseenter', ()=>vid.play());  
        vid.addEventListener('mouseleave', ()=>{ vid.pause(); vid.currentTime=0; });  
        div.appendChild(vid);  
        const pi = document.createElement('div');  
        pi.className = 'play-icon'; pi.textContent = '▶';  
        div.appendChild(pi);  
      }  
  
      div.onclick = ()=>openLightbox(idx);  
      grid.appendChild(div);  
    });  
  }  
  
  document.getElementById('modal').classList.add('open');  
  document.body.style.overflow = 'hidden';  
}  
  
function closeModal(){  
  document.getElementById('modal').classList.remove('open');  
  document.body.style.overflow = '';  
}  
  
/* ══════════════════════════════════════════  
   LIGHTBOX  
══════════════════════════════════════════ */  
function openLightbox(idx){  
  lbIdx = idx;  
  showLb();  
  document.getElementById('lightbox').classList.add('open');  
}  
  
function showLb(){  
  const items = albums[openKey];  
  const item  = items[lbIdx];  
  const img   = document.getElementById('lbImg');  
  const vid   = document.getElementById('lbVid');  
  
  document.getElementById('lbCap').textContent = `${lbIdx+1} / ${items.length}`;  
  
  if(item.type === 'image'){  
    img.src = item.src; img.style.display = 'block';  
    vid.pause(); vid.style.display = 'none';  
  } else {  
    vid.src = item.src; vid.style.display = 'block'; vid.play();  
    img.style.display = 'none';  
  }  
  
  document.getElementById('lbPrev').style.opacity = lbIdx === 0 ? .25 : 1;  
  document.getElementById('lbNext').style.opacity = lbIdx === items.length-1 ? .25 : 1;  
}  
  
function lbNav(d){  
  lbIdx = Math.max(0, Math.min(albums[openKey].length-1, lbIdx+d));  
  showLb();  
}  
  
function closeLightbox(){  
  document.getElementById('lightbox').classList.remove('open');  
  document.getElementById('lbVid').pause();  
}  
  
/* ══════════════════════════════════════════  
   VIDEO  
══════════════════════════════════════════ */  
function openVideo(src){  
  if(audio) audio.pause();  
  const c = document.getElementById('videoContainer');  
  c.innerHTML = `<video src="${src}" controls autoplay playsinline style="width:100%;border-radius:18px"></video>`;  
  c.querySelector('video').onended = ()=>{ if(audio) audio.play().catch(()=>{}); };  
  c.scrollIntoView({behavior:'smooth', block:'start'});  
}  
  
/* ══════════════════════════════════════════  
   KEYBOARD & SWIPE  
══════════════════════════════════════════ */  
document.addEventListener('keydown', e=>{  
  if(e.key==='Escape'){ closeLightbox(); closeModal(); }  
  if(document.getElementById('lightbox').classList.contains('open')){  
    if(e.key==='ArrowRight') lbNav(1);  
    if(e.key==='ArrowLeft')  lbNav(-1);  
  }  
});  
let _tx = 0;  
document.getElementById('lightbox').addEventListener('touchstart', e=>{ _tx=e.touches[0].clientX; },{passive:true});  
document.getElementById('lightbox').addEventListener('touchend',   e=>{ const d=e.changedTouches[0].clientX-_tx; if(Math.abs(d)>50)lbNav(d<0?1:-1); },{passive:true});  
  
/* ══════════════════════════════════════════  
   PWA Service Worker  
══════════════════════════════════════════ */  
if('serviceWorker' in navigator){  
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));  
}  
</script>  </body>  
</html>
